# ====================================
# CONFIGURACIËN PRODUCCIËN (PROD)
# ====================================
# Este archivo contiene la configuraciˇn especÝfica para el entorno de producciˇn.

# Server Configuration
server.port=8080
server.servlet.context-path=/api
server.compression.enabled=true
server.compression.min-response-size=1024

# Database Configuration - PostgreSQL Production
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQL12Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Swagger Configuration - Deshabilitado en producciˇn
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=false

# Logging Configuration
logging.level.root=WARN
logging.level.com.tuusuario.billetera=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - [%thread] - %logger{36} - %msg%n
logging.file.name=/var/log/billetera-api/app-prod.log
logging.file.max-size=50MB
logging.file.max-history=30
logging.file.total-size-cap=10GB

# Application Information
spring.application.name=Billetera Digital API
app.name=Billetera Digital
app.version=1.0.0
app.environment=production

# Error Configuration
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-exception=false

# Jackson Configuration
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=false

# Security Configuration
spring.security.filter.order=5

# Performance Configuration
server.tomcat.max-threads=200
server.tomcat.min-spare-threads=10
server.tomcat.accept-count=100
